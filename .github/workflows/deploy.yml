name: Deploy to AWS EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ec2-13-127-219-128.ap-south-1.compute.amazonaws.com
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          port: 22
          script: |
            cd /var/www/reddot-app
            git pull origin main
            npm install
            npm run build
            pm2 restart reddot-api || pm2 start ecosystem.config.cjs
            sudo nginx -t && sudo systemctl reload nginx
            echo "✅ Deployment complete at $(date)"
